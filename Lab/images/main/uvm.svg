<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
	<rect x="0" y="0" width="400" height="300" fill="#ffffff"/>

	<g stroke="#00462a" stroke-width="3">
		<!-- CPU box -->
		<rect x="50" y="105" width="100" height="90" rx="6" fill="#eef2ea"/>
		<!-- GPU box -->
		<rect x="250" y="105" width="100" height="90" rx="6" fill="#eef2ea"/>

		<!-- shared memory arrows -->
		<line x1="150" y1="130" x2="250" y2="130" marker-end="url(#arrowRight)"/>
		<line x1="250" y1="170" x2="150" y2="170" marker-end="url(#arrowLeft)"/>
	</g>

	<defs>
		<marker id="arrowRight" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
			<path d="M0,0 L10,5 L0,10 z" fill="#00462a"/>
		</marker>
		<marker id="arrowLeft" markerWidth="10" markerHeight="10" refX="2" refY="5" orient="auto">
			<path d="M10,0 L0,5 L10,10 z" fill="#00462a"/>
		</marker>
	</defs>

	<text x="100" y="155" text-anchor="middle" font-family="'Ubuntu Condensed', Arial, sans-serif" font-size="16" fill="#00462a" font-weight="bold">CPU</text>
	<text x="300" y="155" text-anchor="middle" font-family="'Ubuntu Condensed', Arial, sans-serif" font-size="16" fill="#00462a" font-weight="bold">GPU</text>
	<text x="200" y="150" text-anchor="middle" font-family="'Ubuntu Condensed', Arial, sans-serif" font-size="12" fill="#445047">unified</text>
	<text x="200" y="164" text-anchor="middle" font-family="'Ubuntu Condensed', Arial, sans-serif" font-size="12" fill="#445047">memory</text>

	<text x="200" y="240" text-anchor="middle" font-family="'Ubuntu Condensed', Arial, sans-serif" font-size="16" fill="#00462a" font-weight="bold">Unified Virtual Memory</text>
	<text x="200" y="262" text-anchor="middle" font-family="'Ubuntu Condensed', Arial, sans-serif" font-size="13" fill="#63635b">Illustration coming soon</text>
</svg>
